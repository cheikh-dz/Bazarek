<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بزار — لوحة الإدارة</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:   #0b0b14; --bg2: #111120; --bg3: #18182a;
  --card: #151528; --card2:#1c1c32;
  --bd:   #242444; --bd2: #303058;
  --t:    #eae8ff; --t2:  #9898c0; --t3:  #52527a;
  --gold: #f5c518; --gold2:#c8a010; --gd3: rgba(245,197,24,.13);
  --teal: #00c9a7; --tl2: #009e84;  --td3: rgba(0,201,167,.13);
  --red:  #ff4f60; --rd3: rgba(255,79,96,.13);
  --blue: #4a8fe8; --bld3:rgba(74,143,232,.13);
  --purple:#a78bfa; --pd3:rgba(167,139,250,.13);
  --sh: 0 8px 32px rgba(0,0,0,.5);
  --r:14px; --r2:10px; --r3:8px;
  --f:'Cairo',sans-serif;
  --sidebar:240px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--f);background:var(--bg);color:var(--t);min-height:100vh;display:flex;flex-direction:column}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}
a{color:var(--teal);text-decoration:none}
.hidden{display:none!important}

/* ── Animations ── */
@keyframes spin   {to{transform:rotate(360deg)}}
@keyframes fadeUp {from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes pulse  {0%,100%{opacity:1}50%{opacity:.4}}

/* ── Loader ── */
#gl{position:fixed;inset:0;background:rgba(11,11,20,.9);backdrop-filter:blur(6px);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px}
.ring{width:44px;height:44px;border:3px solid var(--bd);border-top-color:var(--gold);border-radius:50%;animation:spin .65s linear infinite}
#gl-msg{font-size:13px;color:var(--t2)}

/* ── Toasts ── */
#toasts{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:9998;display:flex;flex-direction:column;gap:7px;align-items:center;pointer-events:none}
.toast{padding:10px 22px;border-radius:var(--r2);font-size:13px;font-weight:700;box-shadow:var(--sh);animation:fadeUp .3s;max-width:90vw;text-align:center;background:var(--card2);border:1px solid var(--bd);color:var(--t);transition:opacity .3s}
.toast.ok{border-color:var(--teal);color:var(--teal)}
.toast.bad{border-color:var(--red);color:var(--red)}
.toast.warn{border-color:var(--gold);color:var(--gold)}

/* ── Login Screen ── */
#login-screen{position:fixed;inset:0;background:var(--bg);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px}
.login-box{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:32px;max-width:380px;width:100%;animation:fadeUp .4s;position:relative;overflow:hidden}
.login-box::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--gold),var(--teal));animation:shimmer 2s infinite;background-size:200%}
.login-logo{text-align:center;margin-bottom:20px}
.login-logo .lmark{width:56px;height:56px;background:linear-gradient(135deg,var(--gold),var(--gold2));border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:900;color:#0b0b14;margin:0 auto 10px}
.login-logo h1{font-size:20px;font-weight:900;background:linear-gradient(135deg,var(--gold),var(--teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.login-logo p{font-size:12px;color:var(--t3);margin-top:3px;-webkit-text-fill-color:var(--t3)}

/* ── Layout ── */
#app{display:flex;flex:1;min-height:100vh}

/* ── Sidebar ── */
.sidebar{width:var(--sidebar);background:var(--bg2);border-left:1px solid var(--bd);display:flex;flex-direction:column;position:fixed;top:0;right:0;height:100vh;z-index:100;transition:.3s}
.sb-logo{padding:18px 16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px}
.sb-lmark{width:34px;height:34px;background:linear-gradient(135deg,var(--gold),var(--gold2));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;color:#0b0b14;flex-shrink:0}
.sb-title{font-size:15px;font-weight:900;color:var(--gold)}
.sb-sub{font-size:9px;color:var(--t3);letter-spacing:.06em;text-transform:uppercase}
.sb-nav{flex:1;padding:10px 8px;overflow-y:auto}
.sb-section{font-size:9px;font-weight:700;color:var(--t3);letter-spacing:.1em;text-transform:uppercase;padding:10px 10px 5px;margin-top:6px}
.sb-btn{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--r3);border:none;background:none;color:var(--t2);cursor:pointer;font-size:13px;font-family:var(--f);font-weight:600;width:100%;text-align:right;transition:.2s;margin-bottom:2px;position:relative}
.sb-btn:hover{background:var(--card);color:var(--t)}
.sb-btn.on{background:var(--gd3);color:var(--gold)}
.sb-btn .sb-ic{font-size:17px;flex-shrink:0}
.sb-btn .sb-bdg{margin-right:auto;min-width:18px;height:18px;background:var(--red);border-radius:9px;font-size:10px;font-weight:700;color:#fff;display:flex;align-items:center;justify-content:center;padding:0 5px}
.sb-footer{padding:12px 10px;border-top:1px solid var(--bd)}
.sb-user{display:flex;align-items:center;gap:8px;padding:10px;background:var(--card);border-radius:var(--r2);margin-bottom:8px}
.sb-uav{width:34px;height:34px;background:var(--gd3);border-radius:50%;border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.sb-uname{font-size:12px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-uemail{font-size:10px;color:var(--t3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── Main Content ── */
.main{margin-right:var(--sidebar);flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:var(--bg2);border-bottom:1px solid var(--bd);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar-title{font-size:18px;font-weight:900}
.topbar-right{display:flex;align-items:center;gap:8px}
.content{padding:24px;flex:1}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 16px;border-radius:var(--r2);border:none;cursor:pointer;font-weight:700;font-size:13px;font-family:var(--f);transition:.2s;white-space:nowrap}
.btn:disabled{opacity:.4;cursor:not-allowed}
.bg{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#0b0b14}
.bg:hover:not(:disabled){filter:brightness(1.1)}
.bt{background:linear-gradient(135deg,var(--teal),var(--tl2));color:#fff}
.bgh{background:var(--card2);color:var(--t);border:1px solid var(--bd)}
.bgh:hover:not(:disabled){border-color:var(--gold);background:var(--gd3)}
.br{background:var(--rd3);color:var(--red);border:1px solid var(--red)}
.bp{background:var(--pd3);color:var(--purple);border:1px solid var(--purple)}
.fw{width:100%}
.sm{padding:7px 13px;font-size:12px;border-radius:var(--r3)}
.xs{padding:5px 10px;font-size:11px;border-radius:6px}

/* ── Forms ── */
.fi{margin-bottom:14px}
.fi label{display:block;font-size:11px;font-weight:700;color:var(--t2);margin-bottom:5px;letter-spacing:.06em;text-transform:uppercase}
.inp{width:100%;background:var(--bg3);border:1.5px solid var(--bd);border-radius:var(--r2);padding:10px 14px;color:var(--t);font-size:13px;font-family:var(--f);outline:none;transition:.2s}
.inp:focus{border-color:var(--gold)}
.inp::placeholder{color:var(--t3)}
select.inp{cursor:pointer}
textarea.inp{resize:vertical;min-height:80px}

/* ── Stats Grid ── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;margin-bottom:24px}
.stat-card{background:var(--card);border:1px solid var(--bd);border-radius:var(--r);padding:18px 20px;position:relative;overflow:hidden;animation:fadeUp .4s both}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.stat-card.gold::before{background:var(--gold)}
.stat-card.teal::before{background:var(--teal)}
.stat-card.red::before{background:var(--red)}
.stat-card.blue::before{background:var(--blue)}
.stat-card.purple::before{background:var(--purple)}
.stat-ico{font-size:28px;margin-bottom:10px;display:block}
.stat-num{font-size:30px;font-weight:900;line-height:1}
.stat-card.gold .stat-num{color:var(--gold)}
.stat-card.teal .stat-num{color:var(--teal)}
.stat-card.red  .stat-num{color:var(--red)}
.stat-card.blue .stat-num{color:var(--blue)}
.stat-card.purple .stat-num{color:var(--purple)}
.stat-lbl{font-size:12px;color:var(--t2);margin-top:4px;font-weight:600}

/* ── Section Title ── */
.sec-title{font-size:15px;font-weight:800;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.sec-title span{font-size:11px;color:var(--t3);font-weight:600}

/* ── Table / Rows ── */
.tbl{background:var(--card);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;margin-bottom:20px}
.tbl-head{padding:12px 16px;border-bottom:1px solid var(--bd);display:grid;gap:10px;font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.06em}
.tbl-row{padding:12px 16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:12px;transition:.2s;animation:fadeUp .3s both}
.tbl-row:last-child{border:none}
.tbl-row:hover{background:var(--card2)}
.row-img{width:46px;height:46px;border-radius:var(--r3);object-fit:cover;background:var(--bg3);flex-shrink:0;border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:18px}
.row-info{flex:1;min-width:0}
.row-name{font-size:13px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.row-meta{font-size:11px;color:var(--t2);margin-top:3px}
.row-acts{display:flex;gap:6px;flex-shrink:0;flex-wrap:wrap}

/* ── Status Badge ── */
.sb2{display:inline-flex;align-items:center;gap:3px;padding:3px 10px;border-radius:10px;font-size:10px;font-weight:700}
.sa{background:var(--td3);color:var(--teal)}
.sp{background:var(--gd3);color:var(--gold)}
.sr{background:var(--rd3);color:var(--red)}
.sb2.blue{background:var(--bld3);color:var(--blue)}

/* ── User Avatar ── */
.u-av{width:38px;height:38px;border-radius:50%;background:var(--gd3);border:2px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.u-av.vrf{border-color:var(--teal);background:var(--td3)}
.u-av.bnd{border-color:var(--red);background:var(--rd3)}

/* ── Report Card ── */
.rpt-card{background:var(--card);border:1px solid var(--bd);border-radius:var(--r2);padding:14px;margin-bottom:10px;animation:fadeUp .3s both}
.rpt-card.open{border-right:3px solid var(--red)}
.rpt-card.resolved{border-right:3px solid var(--teal);opacity:.7}
.rpt-reason{font-size:14px;font-weight:700;margin-bottom:6px}
.rpt-meta{font-size:11px;color:var(--t2);display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.rpt-acts{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}

/* ── Settings ── */
.settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.setting-card{background:var(--card);border:1px solid var(--bd);border-radius:var(--r);padding:18px}
.setting-title{font-size:13px;font-weight:800;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--bd)}
.toggle-row:last-child{border:none}
.toggle-label{font-size:13px;font-weight:600}
.toggle-desc{font-size:11px;color:var(--t3);margin-top:2px}
.toggle{position:relative;width:44px;height:24px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0;position:absolute}
.toggle-slider{position:absolute;inset:0;background:var(--bd2);border-radius:12px;cursor:pointer;transition:.3s}
.toggle-slider::before{content:'';position:absolute;width:18px;height:18px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.3s}
.toggle input:checked + .toggle-slider{background:var(--teal)}
.toggle input:checked + .toggle-slider::before{transform:translateX(20px)}

/* ── Log ── */
.log-row{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--bd);font-size:12px}
.log-row:last-child{border:none}
.log-ic{width:28px;height:28px;border-radius:var(--r3);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.log-ic.login{background:var(--td3)}
.log-ic.logout{background:var(--bld3)}
.log-ic.ban{background:var(--rd3)}
.log-ic.verify{background:var(--gd3)}
.log-ic.approve{background:var(--td3)}
.log-ic.reject{background:var(--rd3)}
.log-info{flex:1}
.log-txt{font-weight:600;color:var(--t)}
.log-detail{color:var(--t3);margin-top:2px}
.log-time{font-size:10px;color:var(--t3);flex-shrink:0}

/* ── Chips ── */
.chips{display:flex;gap:7px;flex-wrap:wrap}
.chip{padding:7px 15px;border-radius:20px;border:1.5px solid var(--bd);background:var(--bg3);color:var(--t2);cursor:pointer;font-size:12px;font-family:var(--f);font-weight:700;transition:.2s;user-select:none}
.chip:hover{border-color:var(--gold);color:var(--gold)}
.chip.on{background:var(--gd3);border-color:var(--gold);color:var(--gold)}

/* ── Empty ── */
.empty{text-align:center;padding:50px 20px;color:var(--t2)}
.ei{font-size:48px;margin-bottom:12px;opacity:.5}
.et{font-size:15px;font-weight:700;margin-bottom:5px}
.es{font-size:12px;color:var(--t3)}

/* ── Skeleton ── */
.sk{background:linear-gradient(90deg,var(--bg3) 25%,var(--card2) 50%,var(--bg3) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:var(--r3)}

/* ── Charts (simple bars) ── */
.chart-wrap{background:var(--card);border:1px solid var(--bd);border-radius:var(--r);padding:18px;margin-bottom:20px}
.chart-title{font-size:13px;font-weight:800;margin-bottom:16px;color:var(--t2)}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.bar-label{font-size:11px;color:var(--t2);width:80px;text-align:right;flex-shrink:0}
.bar-track{flex:1;background:var(--bg3);border-radius:4px;height:8px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .8s cubic-bezier(.22,1,.36,1)}
.bar-fill.gold{background:linear-gradient(90deg,var(--gold2),var(--gold))}
.bar-fill.teal{background:linear-gradient(90deg,var(--tl2),var(--teal))}
.bar-fill.red{background:linear-gradient(90deg,#c0303d,var(--red))}
.bar-fill.blue{background:linear-gradient(90deg,#1d4ed8,var(--blue))}
.bar-val{font-size:11px;font-weight:700;color:var(--t2);width:36px;text-align:left;flex-shrink:0}

/* ── Modal ── */
.mod-bg{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(5px);z-index:400;display:flex;align-items:center;justify-content:center;padding:20px}
.mod{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);max-width:480px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:var(--sh);animation:fadeUp .3s}
.mod-head{padding:16px 20px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg2);z-index:10}
.mod-head h2{font-size:15px;font-weight:800}
.mod-body{padding:18px 20px 24px}
.xb{width:32px;height:32px;border-radius:var(--r3);border:1px solid var(--bd);background:var(--card);color:var(--t);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:.2s}
.xb:hover{background:var(--rd3);border-color:var(--red);color:var(--red)}

/* ── Confirm Dialog ── */
.confirm-bg{position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(4px);z-index:600;display:flex;align-items:center;justify-content:center;padding:20px}
.confirm-box{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:24px;max-width:360px;width:100%;text-align:center;animation:fadeUp .3s}
.confirm-ic{font-size:42px;margin-bottom:12px}
.confirm-title{font-size:16px;font-weight:800;margin-bottom:8px}
.confirm-msg{font-size:13px;color:var(--t2);margin-bottom:20px;line-height:1.7}
.confirm-acts{display:flex;gap:10px;justify-content:center}

/* ── Responsive ── */
@media(max-width:768px){
  :root{--sidebar:0px}
  .sidebar{transform:translateX(100%);width:260px}
  .sidebar.open{transform:translateX(0)}
  .main{margin-right:0}
  .settings-grid{grid-template-columns:1fr}
  .stats-grid{grid-template-columns:1fr 1fr}
  .mob-menu-btn{display:flex!important}
  .sb-overlay{display:block!important}
}
.mob-menu-btn{display:none;width:36px;height:36px;border-radius:var(--r3);border:1px solid var(--bd);background:var(--card);color:var(--t);cursor:pointer;font-size:16px;align-items:center;justify-content:center}
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:99}
</style>
</head>
<body>

<div id="toasts"></div>
<div id="gl" class="hidden"><div class="ring"></div><span id="gl-msg">جاري التحميل...</span></div>

<!-- Login Screen -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <div class="lmark">ب</div>
      <h1>بـزار — الإدارة</h1>
      <p>للمشرفين فقط</p>
    </div>
    <div class="fi"><label>البريد الإلكتروني</label><input class="inp" type="email" id="l-em" placeholder="admin@example.com" autocomplete="email"></div>
    <div class="fi"><label>كلمة المرور</label><input class="inp" type="password" id="l-pw" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="btn bg fw" onclick="doLogin()" id="l-btn">🔑 دخول</button>
    <div id="l-err" style="color:var(--red);font-size:12px;text-align:center;margin-top:10px;min-height:18px"></div>
  </div>
</div>

<!-- Sidebar Overlay -->
<div class="sb-overlay" id="sb-overlay" onclick="toggleSidebar()"></div>

<!-- App -->
<div id="app" class="hidden">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sb-logo">
      <div class="sb-lmark">ب</div>
      <div><div class="sb-title">بـزار</div><div class="sb-sub">لوحة الإدارة</div></div>
    </div>
    <nav class="sb-nav">
      <div class="sb-section">الرئيسية</div>
      <button class="sb-btn on" onclick="goTab('overview')"   id="sb-overview"> <span class="sb-ic">📊</span> نظرة عامة</button>
      <button class="sb-btn"    onclick="goTab('activity')"   id="sb-activity">  <span class="sb-ic">⚡</span> النشاط الأخير</button>

      <div class="sb-section">المحتوى</div>
      <button class="sb-btn"    onclick="goTab('pending')"    id="sb-pending">   <span class="sb-ic">⏳</span> قيد المراجعة <span class="sb-bdg hidden" id="pending-bdg">0</span></button>
      <button class="sb-btn"    onclick="goTab('products')"   id="sb-products">  <span class="sb-ic">📦</span> كل المنتجات</button>

      <div class="sb-section">المجتمع</div>
      <button class="sb-btn"    onclick="goTab('users')"      id="sb-users">     <span class="sb-ic">👥</span> المستخدمون</button>
      <button class="sb-btn"    onclick="goTab('reports')"    id="sb-reports">   <span class="sb-ic">🚩</span> البلاغات <span class="sb-bdg hidden" id="reports-bdg">0</span></button>
      <button class="sb-btn"    onclick="goTab('messages')"   id="sb-messages">  <span class="sb-ic">💬</span> الرسائل</button>

      <div class="sb-section">النظام</div>
      <button class="sb-btn"    onclick="goTab('logs')"       id="sb-logs">      <span class="sb-ic">🔒</span> سجل الأمان</button>

/* ════ TAB: OVERVIEW ════ */
async function tabOverview(c){
  var [pc, uc, rc, pn, mc] = await Promise.all([
    sb.from('products').select('id,view_count,status,created_at'),
    sb.from('profiles').select('id,is_verified,account_status,created_at'),
    sb.from('reports').select('id,status'),
    sb.from('products').select('id',{count:'exact',head:true}).eq('status','pending'),
    sb.from('messages').select('id',{count:'exact',head:true})
  ]);
  var prods = pc.data||[], users = uc.data||[], rpts = rc.data||[];
  var totalViews = prods.reduce((a,p)=>a+(p.view_count||0),0);
  var approvedCnt = prods.filter(p=>p.status==='approved').length;
  var verifiedCnt = users.filter(u=>u.is_verified).length;
  var openRpts = rpts.filter(r=>r.status==='open').length;

  // last 7 days products
  var now = Date.now();
  var days = Array.from({length:7},(_,i)=>{
    var d = new Date(now - (6-i)*86400000);
    return { label: d.toLocaleDateString('ar-DZ',{weekday:'short'}), date: d.toISOString().slice(0,10) };
  });
  var dayCounts = days.map(d=>({...d, count:prods.filter(p=>p.created_at?.slice(0,10)===d.date).length}));
  var maxDay = Math.max(...dayCounts.map(d=>d.count),1);

  // categories distribution
  var catMap = {};
  prods.forEach(p=>{ if(p.status==='approved') catMap[p.category]=(catMap[p.category]||0)+1; });
  var topCats = Object.entries(catMap).sort((a,b)=>b[1]-a[1]).slice(0,5);
  var maxCat = topCats[0]?.[1]||1;

  c.innerHTML = `
    <div class="stats-grid">
      <div class="stat-card gold" style="animation-delay:.0s"><span class="stat-ico">📦</span><div class="stat-num">${prods.length}</div><div class="stat-lbl">إجمالي المنتجات</div></div>
      <div class="stat-card teal" style="animation-delay:.05s"><span class="stat-ico">👥</span><div class="stat-num">${users.length}</div><div class="stat-lbl">المستخدمون</div></div>
      <div class="stat-card blue" style="animation-delay:.1s"><span class="stat-ico">👁</span><div class="stat-num">${totalViews}</div><div class="stat-lbl">إجمالي المشاهدات</div></div>
      <div class="stat-card red" style="animation-delay:.15s"><span class="stat-ico">🚩</span><div class="stat-num">${openRpts}</div><div class="stat-lbl">بلاغات مفتوحة</div></div>
      <div class="stat-card gold" style="animation-delay:.2s"><span class="stat-ico">✅</span><div class="stat-num">${approvedCnt}</div><div class="stat-lbl">منتجات منشورة</div></div>
      <div class="stat-card teal" style="animation-delay:.25s"><span class="stat-ico">🔒</span><div class="stat-num">${verifiedCnt}</div><div class="stat-lbl">حسابات موثّقة</div></div>
      <div class="stat-card purple" style="animation-delay:.3s"><span class="stat-ico">⏳</span><div class="stat-num">${pn.count||0}</div><div class="stat-lbl">قيد المراجعة</div></div>
      <div class="stat-card blue" style="animation-delay:.35s"><span class="stat-ico">💬</span><div class="stat-num">${mc.count||0}</div><div class="stat-lbl">إجمالي الرسائل</div></div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <div class="chart-wrap">
        <div class="chart-title">📅 المنتجات — آخر 7 أيام</div>
        ${dayCounts.map(d=>`
          <div class="bar-row">
            <div class="bar-label">${esc(d.label)}</div>
            <div class="bar-track"><div class="bar-fill gold" style="width:${Math.round(d.count/maxDay*100)}%"></div></div>
            <div class="bar-val">${d.count}</div>
          </div>`).join('')}
      </div>
      <div class="chart-wrap">
        <div class="chart-title">🏷️ أشهر الفئات</div>
        ${topCats.length ? topCats.map((cat,i)=>`
          <div class="bar-row">
            <div class="bar-label">${esc(cat[0])}</div>
            <div class="bar-track"><div class="bar-fill ${['gold','teal','blue','red','purple'][i%5]}" style="width:${Math.round(cat[1]/maxCat*100)}%"></div></div>
            <div class="bar-val">${cat[1]}</div>
          </div>`).join('') : '<div class="empty" style="padding:20px"><div class="es">لا توجد بيانات</div></div>'}
      </div>
    </div>`;
}

async function tabPending(c){

  loader('...');
  var pr=await sb.from('products').select('*').eq('id',id).single();
  var ir=await sb.from('product_images').select('image_url').eq('product_id',id).order('display_order');
  var sr=await sb.from('profiles').select('full_name,email').eq('id',pr.data?.user_id).maybeSingle();
  unloader();
  if(pr.error||!pr.data) return;
  var p=pr.data; var imgs=(ir.data||[]).map(i=>i.image_url);
  $('#modals').innerHTML=`<div class="mod-bg" onclick="if(event.target===this)closeModal()">
    <div class="mod">
      <div class="mod-head"><h2>👁 معاينة المنتج</h2><button class="xb" onclick="closeModal()">✕</button></div>
      <div class="mod-body">
        ${imgs.length?`<div style="display:flex;gap:6px;overflow-x:auto;margin-bottom:14px">${imgs.map(u=>`<img src="${esc(u)}" style="width:120px;height:120px;object-fit:cover;border-radius:var(--r2);flex-shrink:0;cursor:zoom-in" onclick="window.open('${esc(u)}','_blank')">`).join('')}</div>`:''}
        <div style="font-size:18px;font-weight:900;margin-bottom:8px">${esc(p.name)}</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
          <div style="background:var(--bg3);border-radius:var(--r2);padding:10px"><div style="font-size:10px;color:var(--t3)">الفئة</div><div style="font-weight:700">${esc(p.category)}</div></div>
          <div style="background:var(--bg3);border-radius:var(--r2);padding:10px"><div style="font-size:10px;color:var(--t3)">الصيغة</div><div style="font-weight:700">${esc(p.format)}</div></div>
          ${p.price_da?`<div style="background:var(--bg3);border-radius:var(--r2);padding:10px"><div style="font-size:10px;color:var(--t3)">السعر DA</div><div style="font-weight:700">${p.price_da} DA</div></div>`:''}
          ${p.price_usd?`<div style="background:var(--bg3);border-radius:var(--r2);padding:10px"><div style="font-size:10px;color:var(--t3)">السعر $</div><div style="font-weight:700">$${p.price_usd}</div></div>`:''}
        </div>
        ${p.description?`<p style="font-size:13px;color:var(--t2);line-height:1.8;margin-bottom:14px">${esc(p.description)}</p>`:''}
        <div style="font-size:12px;color:var(--t3)">البائع: ${esc(sr.data?.full_name||'مجهول')} · ${esc(sr.data?.email||'')}</div>
        ${p.status==='pending'?`<div style="display:flex;gap:8px;margin-top:14px">
          <button class="btn bt fw" onclick="closeModal();approve('${p.id}','${esc(p.user_id)}','${esc(p.name)}')">✅ قبول</button>
          <button class="btn br fw" onclick="closeModal();promptReject('${p.id}','${esc(p.user_id)}','${esc(p.name)}')">❌ رفض</button>
        </div>`:''}
      </div>
    </div>
  </div>`;
};

window.viewConv = async id => {
  loader('...');
  var r=await sb.from('messages').select('*').eq('conversation_id',id).order('created_at').limit(50);
  unloader();
  var msgs=r.data||[];
  $('#modals').innerHTML=`<div class="mod-bg" onclick="if(event.target===this)closeModal()">
    <div class="mod">
      <div class="mod-head"><h2>💬 المحادثة</h2><button class="xb" onclick="closeModal()">✕</button></div>
      <div class="mod-body" style="max-height:60vh;overflow-y:auto">
        ${msgs.length?msgs.map(m=>`
          <div style="margin-bottom:12px;padding:10px;background:var(--bg3);border-radius:var(--r2)">
            <div style="font-size:11px;color:var(--t3);margin-bottom:5px">👤 ${esc(m.sender_name||'مجهول')} · ${timeAgo(m.created_at)}</div>
            <div style="font-size:13px">${esc(m.content)}</div>
          </div>`).join('')
        :'<div class="empty" style="padding:20px"><div class="es">لا توجد رسائل</div></div>'}
      </div>
    </div>
  </div>`;
};

/* ════ SETTINGS ACTIONS ════ */
window.saveMaint = async on => {
  await sb.from('site_settings').upsert({key:'maintenance_mode',value:on?'true':'false'},{onConflict:'key'});
  toast(on?'وضع الصيانة مفعّل ⚠️':'الموقع متاح للجميع ✓','ok');
};
window.saveSettings = async () => {
  loader('...');
  var msg=$('#maint-msg')?.value, pl=$('#post-lim')?.value, rl=$('#rpt-lim')?.value;
  var ups=[];
  if(msg) ups.push({key:'maintenance_message',value:msg});
  if(pl)  ups.push({key:'daily_post_limit',value:pl});
  if(rl)  ups.push({key:'daily_report_limit',value:rl});
  for(var u of ups) await sb.from('site_settings').upsert(u,{onConflict:'key'});
  unloader(); toast('تم حفظ الإعدادات ✓','ok');
};
window.addAdmin = () => {
  var em=$('#new-admin')?.value?.trim();
  if(!em) return;
  toast('أضف "'+em+'" إلى ADMIN_EMAILS في ملف admin.html','warn');
};
window.cleanRejected = () => {
  confirm2('🗑️','حذف المنتجات المرفوضة','هل أنت متأكد؟ سيتم حذف كل المنتجات ذات حالة مرفوض.','حذف الكل','br',async()=>{
    loader('...');
    var r=await sb.from('products').select('id').eq('status','rejected');
    if(r.data) for(var p of r.data){ await sb.from('product_images').delete().eq('product_id',p.id); await sb.from('products').delete().eq('id',p.id); }
    unloader(); toast('تم الحذف ✓','ok');
  });
};
window.cleanViews = () => {
  confirm2('🗑️','حذف المشاهدات القديمة','حذف مشاهدات أقدم من 30 يوم؟','حذف','br',async()=>{
    loader('...');
    var d=new Date(); d.setDate(d.getDate()-30);
    await sb.from('product_views').delete().lt('viewed_at',d.toISOString());
    unloader(); toast('تم الحذف ✓','ok');
  });
};
window.cleanNotifs = () => {
  confirm2('🗑️','حذف الإشعارات القديمة','حذف إشعارات مقروءة أقدم من 30 يوم؟','حذف','br',async()=>{
    loader('...');
    var d=new Date(); d.setDate(d.getDate()-30);
    await sb.from('notifications').delete().eq('is_read',true).lt('created_at',d.toISOString());
    unloader(); toast('تم الحذف ✓','ok');
  });
};

/* ════ SECURITY LOG ════ */
async function logAction(type, details){
  try{
    await sb.from('security_logs').insert({
      user_id:ME.id, user_email:ME.email,
      event_type:type, details
    });
  }catch(e){}
}

/* ════ REALTIME ════ */
function setupRT(){
  sb.channel('admin_rt')
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'products',filter:'status=eq.pending'},()=>{
      loadBadges();
      if(curTab==='pending'||curTab==='overview') loadTab(curTab);
      toast('منتج جديد قيد المراجعة 📦','warn');
    })
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'reports',filter:'status=eq.open'},()=>{
      loadBadges();
      if(curTab==='reports') loadTab(curTab);
      toast('بلاغ جديد 🚩','warn');
    })
    .subscribe();
}

/* ════ START ════ */
init();

})();
</script>
